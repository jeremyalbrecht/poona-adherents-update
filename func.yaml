# $schema: https://raw.githubusercontent.com/knative/func/3804dc9b/schema/func_yaml-schema.json
# yaml-language-server: $schema=https://raw.githubusercontent.com/knative/func/3804dc9b/schema/func_yaml-schema.json
specVersion: 0.36.0
name: update-poona
runtime: python
created: 2026-06-02T08:37:16.948834+02:00
registry: docker.io/jeremyalbrecht
namespace: augny-badminton
build:
  builderImages:
    pack: ghcr.io/knative/builder-jammy-base:latest
run:
  envs:
    - name: POONA_EXPORT_TEMPLATE_ID
      value: "26292"
    - name: POONA_USERNAME
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: POONA_USERNAME
    - name: POONA_PASSWORD
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: POONA_PASSWORD
    - name: GOOGLE_SHEETS_ID
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: GOOGLE_SHEETS_ID
    - name: GOOGLE_SHEET_NAME
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: GOOGLE_SHEET_NAME
    - name: GOOGLE_SERVICE_ACCOUNT_JSON
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: GOOGLE_SERVICE_ACCOUNT_JSON
    - name: OPENAI_API_KEY
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: OPENAI_API_KEY
    - name: POONA_SECRET_NAME
      valueFrom:
        secretKeyRef:
          name: update-poona-secrets
          key: POONA_SECRET_NAME
deploy:
  options:
    scale:
      min: 0
      max: 1