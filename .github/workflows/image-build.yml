name: Image Build

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'function/**'
      - 'pyproject.toml'

jobs:
  container:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Install func CLI
        run: |
          curl -sL https://github.com/knative/func/releases/latest/download/func_linux_amd64 \
            -o /usr/local/bin/func
          chmod +x /usr/local/bin/func

      - name: Build and push
        run: func build --platform linux/amd64 --push

      - name: Tag with git SHA
        run: |
          docker tag docker.io/jeremyalbrecht/update-poona:latest \
            jeremyalbrecht/update-poona:${{ github.sha }}
          docker push jeremyalbrecht/update-poona:${{ github.sha }}
